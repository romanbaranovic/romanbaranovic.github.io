text_skin: ocean
highlight_theme: default
url: "https://romanbaranovic.github.io"
title: Digitálny školník
description: Osobný blog o AI a digitálnom svete

lang: sk
timezone: Europe/Bratislava

author:
  type: person
  name: Roman Baranovic
  bio: Píšem o AI, technológiách a digitálnom svete.
  github: romanbaranovic

repository: romanbaranovic/romanbaranovic.github.io
repository_tree: main

excerpt_separator: <!--more-->

toc:
  selectors: "h2,h3"

paginate: 8
paginate_path: /page:num

search:
  provider: default

analytics:
  provider: google
  google:
    tracking_id: G-M37R8EG602
    anonymize_ip: false

markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

exclude:
  - CHANGELOG.md
  - HOW_TO_RELEASE.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - jekyll-text-theme.gemspec
  - package.json
  - /docs
  - /node_modules
  - /screenshots
  - /test
  - /vendor

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      aside:
        toc: true

plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme
